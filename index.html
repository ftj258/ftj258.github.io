<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatema T. Johra — Incident Response &amp; Digital Forensics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #2A2A2D;
    --paper: #343438;
    --ink: #F3F1EC;
    --ink-soft: #B8B2A6;
    --navy: #F3F1EC;
    --navy-soft: #D8D3C8;
    --line: rgba(255,255,255,0.10);
    --line-strong: rgba(255,255,255,0.20);
    --accent: #4272AD;
    --accent-soft: rgba(66,114,173,0.18);
    --active: #7FB89E;
    --active-soft: rgba(127,184,158,0.14);
    --closed: #A39C8E;
    --closed-soft: rgba(163,156,142,0.14);
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body{
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  a { color: var(--accent); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .wrap{ max-width: 760px; margin: 0 auto; padding: 0 28px; }

  /* ---------- Top bar ---------- */
  .topbar{
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    position: sticky; top: 0; z-index: 20;
  }
  .topbar-inner{
    max-width: 760px; margin: 0 auto; padding: 14px 28px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 12.5px; letter-spacing: .03em;
    color: var(--ink-soft);
  }
  .topbar-inner nav{ display: flex; gap: 20px; }
  .topbar-inner nav a{ color: var(--ink-soft); text-decoration: none; }
  .topbar-inner nav a:hover{ color: var(--accent); text-decoration: underline; }

  /* ---------- Hero ---------- */
  .hero{ padding: 36px 0 24px; }
  .banner-img{
    width: 100%; max-width: 100%; height: auto; display: block;
    border-radius: 4px; margin-bottom: 16px; border: 1px solid var(--line);
  }
  .hero .stamp{
    display: inline-block; font-family: var(--mono); font-size: 11.5px;
    letter-spacing: .08em; color: var(--accent); border: 1px solid var(--accent);
    padding: 3px 9px; border-radius: 2px; margin-bottom: 14px; text-transform: uppercase;
  }
  .hero h1{
    font-family: var(--serif); font-weight: 600; font-size: clamp(2.1rem, 5vw, 2.9rem);
    line-height: 1.12; margin: 0 0 12px; color: var(--navy);
  }
  .name-rule{ width: 90px; height: 2px; background: var(--accent); margin-bottom: 16px; }
  .hero .role-line{
    font-family: var(--mono); font-size: 13.5px; color: var(--accent);
    letter-spacing: .12em; text-transform: uppercase; margin-bottom: 14px;
  }
  .hero p.lede{
    font-size: 1.08rem; max-width: 58ch; color: var(--ink); margin: 0 0 14px;
  }
  .meta-row{
    display: flex; flex-wrap: wrap; gap: 8px 10px; font-family: var(--mono); font-size: 12px;
    color: var(--ink-soft); margin-bottom: 16px;
  }
  .meta-row span{
    border: 1px solid var(--line-strong); padding: 3px 8px; border-radius: 2px; background: var(--paper);
  }
  .contact-row{ display: flex; flex-wrap: wrap; gap: 4px 18px; font-size: 14.5px; }
  .contact-row a{ text-decoration: none; border-bottom: 1px solid var(--line-strong); }
  .contact-row a:hover{ border-color: var(--accent); }

  /* ---------- Section scaffolding ---------- */
  section{ padding: 12px 0; }
  section:first-of-type{ border-top: none; }
  .eyebrow{
    font-family: var(--mono); font-size: 11.5px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 8px;
  }
  h2{
    font-family: var(--serif); font-weight: 600; font-size: 1.5rem; color: var(--navy);
    margin: 0 0 12px;
  }

  /* ---------- Focus tags ---------- */
  .tag-row{ display: flex; flex-wrap: wrap; gap: 9px; }
  .tag{
    font-family: var(--mono); font-size: 12.5px; color: var(--navy);
    background: var(--paper); border: 1px solid var(--line-strong);
    padding: 5px 11px; border-radius: 2px;
  }

  /* ---------- About cards ---------- */
  .card-grid{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
  .card{
    background: var(--paper); border: 1px solid var(--line); border-radius: 3px;
    padding: 13px 14px 15px;
  }
  .card .card-title{ font-weight: 600; font-size: 14.5px; color: var(--navy); margin-bottom: 5px; }
  .card p{ font-size: 13.5px; color: var(--ink-soft); margin: 0; }

  /* ---------- Case files (experience) ---------- */
  .case{
    background: var(--paper); border: 1px solid var(--line); border-radius: 3px;
    margin-bottom: 12px; overflow: hidden;
  }
  .case-head{
    display: flex; justify-content: flex-end; align-items: center; flex-wrap: wrap; gap: 8px;
    padding: 10px 16px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,0.03);
  }
  .case-id{ font-family: var(--mono); font-size: 12px; color: var(--ink-soft); }
  .status{
    font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 2px;
  }
  .status.active{ background: var(--active-soft); color: var(--active); }
  .status.closed{ background: var(--closed-soft); color: var(--closed); }
  .case-body{ padding: 14px 16px 16px; }
  .case-role{ font-weight: 600; font-size: 16px; margin: 0 0 2px; }
  .case-org{ font-size: 13.5px; color: var(--ink-soft); margin: 0 0 9px; }
  .case-body ul{ margin: 0; padding-left: 18px; }
  .case-body li{ font-size: 14px; margin-bottom: 5px; color: var(--ink); }
  .case-body li:last-child{ margin-bottom: 0; }

  /* ---------- Projects ---------- */
  .project{
    display: flex; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--line);
  }
  .project:last-child{ border-bottom: none; }
  .project .dot{
    flex: none; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    margin-top: 8px;
  }
  .project h3{ font-size: 15px; margin: 0 0 3px; font-weight: 600; }
  .project p{ margin: 0; font-size: 13.5px; color: var(--ink-soft); }

  /* ---------- Education / certs ---------- */
  .edu-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .edu-grid h3{ font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-soft); margin: 0 0 8px; font-family: var(--mono); font-weight: 500;}
  .edu-item{ margin-bottom: 9px; font-size: 14px; }
  .edu-item .deg{ font-weight: 600; }
